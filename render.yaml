services:
  - type: web
    name: machy-api
    env: node
    region: oregon
    plan: starter
    rootDir: packages/backend
    buildCommand: cd ../.. && npm install && cd packages/backend && npx prisma generate && npx tsc
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /api/ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
